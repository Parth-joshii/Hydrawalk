name: Build Cross-Platform Flutter Wrappers

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Flutter Packages
        run: |
          cd hydrawalk_flutter
          flutter pub get

      - name: Build Android APK
        run: |
          cd hydrawalk_flutter
          flutter build apk --release

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hydrawalk-android-apk
          path: hydrawalk_flutter/build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Enable Developer Mode on Runner
        run: |
          reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /t REG_DWORD /v "AllowDevelopmentWithoutDevLicense" /d 1 /f

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Flutter Packages
        run: |
          cd hydrawalk_flutter
          flutter pub get

      - name: Build Windows App
        run: |
          cd hydrawalk_flutter
          flutter build windows --release

      - name: Archive Windows Release
        shell: powershell
        run: |
          Compress-Archive -Path hydrawalk_flutter/build/windows/x64/runner/Release/* -DestinationPath hydrawalk-windows-x64.zip

      - name: Upload Windows App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hydrawalk-windows-desktop
          path: hydrawalk-windows-x64.zip
